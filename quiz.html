<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수업 성취도 자가 진단 퀴즈 - 사업계획서 AI자동화 마스터</title>
    <!-- Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background-color: #070a13;
            color: #e2e8f0;
            background-image: radial-gradient(#1e293b 1.5px, transparent 1.5px);
            background-size: 32px 32px;
        }
        .option-item {
            transition: all 0.2s ease;
        }
        .option-item:hover {
            border-color: rgba(59, 130, 246, 0.5);
            background-color: rgba(30, 41, 59, 0.5);
        }
        .option-item.selected {
            border-color: #3b82f6;
            background-color: rgba(59, 130, 246, 0.1);
            color: #ffffff;
        }
        .option-item.correct {
            border-color: #10b981;
            background-color: rgba(16, 185, 129, 0.1);
            color: #34d399;
        }
        .option-item.incorrect {
            border-color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
            color: #f87171;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col justify-between text-lg">

    <!-- HEADER -->
    <header class="w-full py-6 px-8 flex items-center justify-between border-b border-white/10 bg-slate-900/80 backdrop-blur-md sticky top-0 z-40">
        <div class="flex items-center space-x-3">
            <div class="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-xl font-black text-lg shadow-md">Quiz</div>
            <span class="font-black text-xl text-white select-none">수업 성취도 자가 진단 퀴즈</span>
        </div>
        <button onclick="window.close()" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-xl text-sm font-bold transition">
            창 닫기
        </button>
    </header>

    <!-- MAIN QUIZ AREA -->
    <main class="max-w-4xl w-full mx-auto px-6 py-12 flex-grow space-y-12">
        <div class="space-y-4 text-center">
            <h1 class="text-3xl md:text-4xl font-black text-white">자가 진단 퀴즈 (10문항)</h1>
            <p class="text-ink-300 text-base">2일차 교육 과정을 이수하셨나요? 아래 퀴즈를 풀어 기준 점수(70점) 이상을 충족해 보세요.</p>
        </div>

        <div id="quiz-container" class="space-y-8">
            <!-- Questions will be rendered here dynamically -->
        </div>

        <div class="flex gap-6 justify-center pt-8 border-t border-white/10">
            <button id="submit-quiz-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-extrabold px-8 py-4 rounded-2xl text-base transition active:scale-95 shadow-lg shadow-blue-500/20">
                답안 제출 및 채점하기
            </button>
            <button id="reset-quiz-btn" class="bg-slate-900 border border-white/10 text-slate-300 font-bold px-8 py-4 rounded-2xl text-base transition hover:bg-slate-800">
                다시 풀기
            </button>
        </div>

        <div id="quiz-result" class="hidden p-8 rounded-[24px] border-2 transition duration-300"></div>
    </main>

    <!-- FOOTER -->
    <footer class="w-full py-8 border-t border-white/10 bg-slate-950/80 text-center text-slate-400 text-xs">
        <p>&copy; 2026 아동복지 현장 교육 프로그램 기획서 작성 실무 과정. All Rights Reserved.</p>
    </footer>

    <script src="quiz.js"></script>
</body>
</html>
